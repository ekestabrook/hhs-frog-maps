<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cope's Gray Treefrog Indiana Range Map</title>
<style>
  :root {
    --card-bg: #ffffff;
    --card-border: #d8ddd7;
    --map-bg: #ffffff;
    --state-fill: #efefee;
    --state-border: #aeb8b0;
    --text: #26322a;
    --muted: #5f6a63;
    --range: #3CA24E;
    --range-stroke: #2A7A38;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    font-family: Arial, Helvetica, sans-serif;
    color: var(--text);
  }

  .range-card {
    width: 100%;
    max-width: 430px;
    margin: 0 auto;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 14px 14px 12px;
  }

  .county-label {
    min-height: 26px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 8px;
    font-size: 17px;
    font-weight: 600;
    color: var(--text);
    text-align: center;
  }

  .county-label.empty {
    color: transparent;
    user-select: none;
  }

  .map-wrap {
    width: 100%;
    background: var(--map-bg);
    border: 1px solid #dfe4df;
    border-radius: 10px;
    overflow: hidden;
  }

  svg {
    display: block;
    width: 100%;
    height: auto;
  }

  .legend {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 12px;
    font-size: 16px;
    font-weight: 500;
    color: var(--text);
  }

  .swatch {
    width: 26px;
    height: 26px;
    border-radius: 5px;
    background: var(--range);
    flex: 0 0 26px;
  }

  .note {
    margin: 12px 0 0;
    font-size: 13px;
    line-height: 1.45;
    color: var(--muted);
  }

  .divider {
    height: 1px;
    background: #e2e6e1;
    margin: 12px 0 10px;
  }

  .meta {
    font-size: 13px;
    line-height: 1.4;
    color: var(--text);
  }

  .meta + .meta { margin-top: 4px; }
  .meta strong { font-weight: 600; }

  @media (max-width: 480px) {
    .range-card {
      padding: 12px;
      border-radius: 10px;
    }
    .county-label { font-size: 15px; min-height: 22px; }
    .legend { font-size: 15px; }
    .note, .meta { font-size: 12px; }
  }
</style>
</head>

      </svg>
    </div>

    <div class="legend">

    </div>

    <p class="note">Range boundaries are approximate and may not include every isolated or newly documented occurrence.</p>

    <div class="divider"></div>

    <div class="meta"><strong>Range data:</strong> Center for North American Herpetology (CNAH) and Travis W. Taggart &middot; 2025</div>

    function setCountyLabel(name) {
      if (name) {
        countyLabel.textContent = name + ' County';
        countyLabel.classList.remove('empty');
      } else {
        countyLabel.textContent = 'County name';
        countyLabel.classList.add('empty');
      }
    }

    async function init() {
      const [stateTopo, countyTopo] = await Promise.all([
        d3.json('https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json'),
        d3.json('https://cdn.jsdelivr.net/npm/us-atlas@3/counties-10m.json')
      ]);

      const states = topojson.feature(stateTopo, stateTopo.objects.states).features;
      const indiana = states.find(f => String(f.id).padStart(2, '0') === '18');
      if (!indiana) throw new Error('Indiana state geometry was not found.');

      const allCounties = topojson.feature(countyTopo, countyTopo.objects.counties).features;
      const indianaCounties = allCounties.filter(f => String(f.id).padStart(5, '0').startsWith('18'));

      const projection = d3.geoConicConformal()
        .parallels([37.5, 41.8])
        .rotate([86.2, 0])
        .center([0, 39.6]);

      projection.fitExtent([[34, 26], [width - 34, height - 26]], indiana);
      const path = d3.geoPath(projection);

      const defs = svg.append('defs');
      defs.append('clipPath')
        .attr('id', 'indianaClip')
        .append('path')
        .datum(indiana)
        .attr('d', path);

      // Base state shape.
      svg.append('path')
        .datum(indiana)
        .attr('d', path)
        .attr('fill', '#efefee')
        .attr('stroke', 'none');

      // CNAH range polygon clipped to Indiana.
      svg.append('path')
        .datum(rangeGeo)
        .attr('d', path)
        .attr('clip-path', 'url(#indianaClip)')
        .attr('fill', '#3CA24E')
        .attr('fill-opacity', 0.82)
        .attr('stroke', '#2A7A38')
        .attr('stroke-width', 0.8)
        .attr('stroke-opacity', 0.4)
        .attr('pointer-events', 'none');

      // County boundaries on top for geographic reference.
      svg.append('g')
        .attr('clip-path', 'url(#indianaClip)')
        .selectAll('path')
        .data(indianaCounties)
        .join('path')
        .attr('d', path)
        .attr('fill', 'none')
        .attr('stroke', '#ffffff')
        .attr('stroke-width', 0.9)
        .attr('stroke-opacity', 0.9)
        .attr('pointer-events', 'none');

      // Crisp Indiana outline.
      svg.append('path')
        .datum(indiana)
        .attr('d', path)
        .attr('fill', 'none')
        .attr('stroke', '#aeb8b0')
        .attr('stroke-width', 1.7)
        .attr('stroke-linejoin', 'round')
        .attr('pointer-events', 'none');

      // Hover/tap outline and county-name interaction.
      const hoverOutline = svg.append('path')
        .attr('fill', 'none')
        .attr('stroke', '#26322a')
        .attr('stroke-width', 1.6)
        .attr('stroke-opacity', 0.55)
        .attr('pointer-events', 'none')
        .style('display', 'none');

      svg.append('g')
        .selectAll('path')
        .data(indianaCounties)
        .join('path')
        .attr('d', path)
        .attr('fill', 'transparent')
        .attr('tabindex', 0)
        .attr('role', 'button')
        .attr('aria-label', d => (d.properties?.name || 'Indiana county') + ' County')
        .style('cursor', 'pointer')
        .on('mouseenter', function(event, d) {
          setCountyLabel(d.properties?.name || '');
          hoverOutline.datum(d).attr('d', path).style('display', null);
        })
        .on('mouseleave', function() {
          setCountyLabel('');
          hoverOutline.style('display', 'none');
        })
        .on('focus', function(event, d) {
          setCountyLabel(d.properties?.name || '');
          hoverOutline.datum(d).attr('d', path).style('display', null);
        })
        .on('blur', function() {
          setCountyLabel('');
          hoverOutline.style('display', 'none');
        })
        .on('click', function(event, d) {
          setCountyLabel(d.properties?.name || '');
          hoverOutline.datum(d).attr('d', path).style('display', null);
        });
    }

    init().catch(err => {
      console.error('Map failed to load', err);
      countyLabel.textContent = 'Map could not load';
      countyLabel.classList.remove('empty');
      svg.append('text')
        .attr('x', width / 2)
        .attr('y', height / 2)
        .attr('text-anchor', 'middle')
        .attr('fill', '#5f6a63')
        .attr('font-size', 15)
        .text('Map could not load.');
    });
  </script>
