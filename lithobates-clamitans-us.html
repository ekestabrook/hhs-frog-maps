<!DOCTYPE html>
<!-- HHS Green Frog U.S. comparison map -->
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Green Frog &mdash; U.S. Range &amp; Look-alikes</title>
<style>
  :root {
    --card-bg: #ffffff;
    --card-border: #d8ddd7;
    --map-water: #dce9f5;
    --state-fill: #efefee;
    --text: #26322a;
    --muted: #5f6a63;
    --button-bg: #f3f5f2;
    --button-border: #cbd2ca;
    --button-hover: #e8ece7;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: transparent; font-family: Arial, Helvetica, sans-serif; color: var(--text); }
  .range-card {
    width: 100%;
    max-width: 900px;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 14px 14px 12px;
  }
  .map-toolbar {
    min-height: 38px;
    display: grid;
    grid-template-columns: minmax(120px, 1fr) minmax(120px, 2fr) minmax(120px, 1fr);
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .back-button {
    justify-self: start;
    border: 1px solid var(--button-border);
    border-radius: 7px;
    background: var(--button-bg);
    color: var(--text);
    font: inherit;
    font-size: 14px;
    font-weight: 600;
    padding: 7px 10px;
    cursor: pointer;
  }
  .back-button:hover, .back-button:focus-visible { background: var(--button-hover); }
  .back-button[hidden] { display: none; }
  .geo-label {
    grid-column: 2;
    min-height: 26px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 17px;
    font-weight: 600;
    color: var(--text);
    text-align: center;
  }
  .geo-label.empty { color: transparent; user-select: none; }
  .map-wrap {
    width: 100%;
    background: #dce9f5;
    border: 1px solid #dfe4df;
    border-radius: 10px;
    overflow: hidden;
  }
  svg { display: block; width: 100%; height: auto; }
  .legend {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 10px 14px;
    margin-top: 12px;
  }
  .legend-item { display: flex; align-items: flex-start; gap: 10px; min-width: 0; }
  .swatch { width: 22px; height: 22px; border-radius: 5px; flex: 0 0 22px; margin-top: 2px; border: 1px solid rgba(0,0,0,0.08); }
  .legend-text { line-height: 1.25; min-width: 0; }
  .legend-common { font-size: 15px; font-weight: 600; color: var(--text); }
  .legend-latin { font-size: 12px; font-style: italic; color: var(--muted); }
  .note { margin: 12px 0 0; font-size: 13px; line-height: 1.45; color: var(--muted); }
  .divider { height: 1px; background: #e2e6e1; margin: 12px 0 10px; }
  .meta { font-size: 13px; line-height: 1.4; color: var(--text); }
  .meta strong { font-weight: 600; }
  .interactive-hit { fill: rgba(0,0,0,0); cursor: pointer; }
  .hover-outline { fill: none; stroke: rgba(38,50,42,0.65); stroke-width: 1.8; pointer-events: none; }
  .loading { fill: var(--muted); font-size: 16px; text-anchor: middle; }
  @media (max-width: 600px) {
    .range-card { padding: 12px; border-radius: 10px; }
    .map-toolbar { grid-template-columns: auto 1fr; min-height: 34px; }
    .geo-label { grid-column: 2; font-size: 15px; justify-content: flex-end; }
    .back-button { font-size: 13px; padding: 6px 8px; }
    .legend { grid-template-columns: 1fr 1fr; gap: 10px; }
    .legend-common { font-size: 14px; }
    .legend-latin { font-size: 11px; }
    .note, .meta { font-size: 12px; }
  }
</style>
</head>

    let topoData = null;
    let stateFeatures = [];
    let neighborFeatures = [];
    let currentStateId = null;
    let countyDataPromise = null;

    function normalizeStateId(value) {
      return String(value).padStart(2, '0');
    }

    function setLabel(text, fallback = '') {
      const value = text || fallback;
      if (value) {
        geoLabel.textContent = value;
        geoLabel.classList.remove('empty');
      } else {
        geoLabel.textContent = 'Geographic name';
        geoLabel.classList.add('empty');
      }
    }

    function clearMap() {
      svg.selectAll('*').remove();
    }

    function buildLegend() {
      legend.innerHTML = '';
      ranges.forEach(r => {
        const item = document.createElement('div');
        item.className = 'legend-item';
        item.innerHTML = `
          <span class="swatch" style="background:${r.fill}"></span>
          <span class="legend-text">
            <div class="legend-common">${r.common}</div>
            <div class="legend-latin">${r.latin}</div>
          </span>`;
        legend.appendChild(item);
      });
    }

    function stripePatternId(colors){ return 'pat_'+colors.map(function(c){return c.replace('#','');}).join('_'); }
    function ensureStripePattern(defs, colors){
      var id = stripePatternId(colors);
      if (document.getElementById(id)) return id;
      var bw = 5, w = bw*colors.length;
      var p = defs.append('pattern').attr('id', id).attr('width', w).attr('height', 14).attr('patternUnits','userSpaceOnUse').attr('patternTransform','rotate(45)');
      colors.forEach(function(c,i){ p.append('rect').attr('x', i*bw).attr('width', bw).attr('height', 14).attr('fill', c); });
      return id;
    }
    function kCombos(arr, k){ var res=[]; (function go(start, combo){ if(combo.length===k){res.push(combo.slice());return;} for(var i=start;i<arr.length;i++){combo.push(arr[i]); go(i+1, combo); combo.pop();} })(0,[]); return res; }
    function drawRangeLayers(path, clipId) {
      if (clipId === undefined) clipId = null;
      var root = svg.append('g'); if (clipId) root.attr('clip-path', 'url(#'+clipId+')');
      var defs = svg.append('defs'); var ctx = clipId || 'us';
      ranges.forEach(function(r,i){ defs.append('clipPath').attr('id','rc_'+i+'_'+ctx).append('path').datum(r.geometry).attr('d', path); });
      ranges.forEach(function(r){ root.append('path').datum(r.geometry).attr('d', path).attr('fill', r.fill).attr('stroke','none').attr('pointer-events','none'); });
      var idx = ranges.map(function(v,i){return i;});
      for (var size=2; size<=ranges.length; size++){
        kCombos(idx, size).forEach(function(combo){
          var patId = ensureStripePattern(defs, combo.map(function(i){return ranges[i].fill;}));
          var g = root; for (var k=0;k<combo.length-1;k++){ g = g.append('g').attr('clip-path','url(#rc_'+combo[k]+'_'+ctx+')'); }
          g.append('path').datum(ranges[combo[combo.length-1]].geometry).attr('d', path).attr('fill','url(#'+patId+')').attr('pointer-events','none');
        });
      }
      ranges.forEach(function(r){ root.append('path').datum(r.geometry).attr('d', path).attr('fill','none').attr('stroke', r.stroke).attr('stroke-width', 1.0).attr('stroke-opacity', 0.9).attr('stroke-linejoin','round').attr('pointer-events','none'); });
    }

    function renderUsMap() {
      currentStateId = null;
      backButton.hidden = true;
      setLabel('');
      clearMap();

      const featureCollection = { type: 'FeatureCollection', features: stateFeatures };
      const projection = d3.geoAlbers();
      projection.fitExtent([[18, 18], [width - 18, height - 18]], featureCollection);
      const path = d3.geoPath(projection);

      svg.append('g').selectAll('path').data(neighborFeatures).join('path').attr('d', path).attr('fill', '#efefee').attr('stroke', '#cfd3ce').attr('stroke-width', 0.8).attr('pointer-events','none');

      svg.append('g')
        .selectAll('path')
        .data(stateFeatures)
        .join('path')
        .attr('d', path)
        .attr('fill', '#efefee')
        .attr('stroke', 'none');

      drawRangeLayers(path);

      const borderMesh = topojson.mesh(
        topoData,
        topoData.objects.states,
        (a, b) => a !== b && selectedIds.has(normalizeStateId(a.id)) && selectedIds.has(normalizeStateId(b.id))
      );
      svg.append('path')
        .datum(borderMesh)
        .attr('d', path)
        .attr('fill', 'none')
        .attr('stroke', '#ffffff')
        .attr('stroke-width', 1.15)
        .attr('stroke-linejoin', 'round')
        .attr('pointer-events', 'none');

      const outerBoundaryMesh = topojson.mesh(
        topoData,
        topoData.objects.states,
        (a, b) => a === b && selectedIds.has(normalizeStateId(a.id))
      );
      svg.append('path')
        .datum(outerBoundaryMesh)
        .attr('d', path)
        .attr('fill', 'none')
        .attr('stroke', '#ffffff')
        .attr('stroke-width', 2.4)
        .attr('stroke-linejoin', 'round')
        .attr('pointer-events', 'none');

      const hoverOutline = svg.append('path')
        .attr('class', 'hover-outline')
        .style('display', 'none');

      svg.append('g')
        .selectAll('path')
        .data(stateFeatures)
        .join('path')
        .attr('class', 'interactive-hit')
        .attr('tabindex', 0)
        .attr('role', 'button')
        .attr('aria-label', d => `${stateNames[normalizeStateId(d.id)]}. Open county map.`)
        .attr('d', path)
        .on('mouseenter', function(event, d) {
          const id = normalizeStateId(d.id);
          setLabel(stateNames[id]);
          hoverOutline.datum(d).attr('d', path).style('display', null);
        })
        .on('mouseleave', function() {
          setLabel('');
          hoverOutline.style('display', 'none');
        })
        .on('focus', function(event, d) {
          const id = normalizeStateId(d.id);
          setLabel(stateNames[id]);
          hoverOutline.datum(d).attr('d', path).style('display', null);
        })
        .on('blur', function() {
          setLabel('');
          hoverOutline.style('display', 'none');
        })
        .on('click', function(event, d) {
          renderStateMap(normalizeStateId(d.id));
        })
        .on('keydown', function(event, d) {
          if (event.key === 'Enter' || event.key === ' ') {
            event.preventDefault();
            renderStateMap(normalizeStateId(d.id));
          }
        });
    }

    function getCountyData() {
      if (!countyDataPromise) {
        countyDataPromise = d3.json('https://cdn.jsdelivr.net/gh/plotly/datasets@master/geojson-counties-fips.json');
      }
      return countyDataPromise;
    }

    async function renderStateMap(stateId) {
      currentStateId = stateId;
      const stateName = stateNames[stateId];
      backButton.hidden = false;
      setLabel(stateName);
      clearMap();

      svg.append('text')
        .attr('class', 'loading')
        .attr('x', width / 2)
        .attr('y', height / 2)
        .text('Loading county map…');

      try {
        const countyGeo = await getCountyData();
        if (currentStateId !== stateId) return;

        clearMap();
        const stateFeature = stateFeatures.find(f => normalizeStateId(f.id) === stateId);
        const countyFeatures = countyGeo.features.filter(f => String(f.id).padStart(5, '0').slice(0, 2) === stateId);

        // Use a north-up projection for state drill-downs so states do not appear tilted.
        const projection = d3.geoMercator();
        projection.fitExtent([[38, 30], [width - 38, height - 30]], stateFeature);
        const path = d3.geoPath(projection);
        const clipId = `stateClip-${stateId}`;

        const defs = svg.append('defs');
        defs.append('clipPath')
          .attr('id', clipId)
          .append('path')
          .datum(stateFeature)
          .attr('d', path);

        svg.append('path')
          .datum(stateFeature)
          .attr('d', path)
          .attr('fill', '#efefee')
          .attr('stroke', 'none');

        drawRangeLayers(path, clipId);

        svg.append('g')
          .attr('clip-path', `url(#${clipId})`)
          .selectAll('path')
          .data(countyFeatures)
          .join('path')
          .attr('d', path)
          .attr('fill', 'none')
          .attr('stroke', '#ffffff')
          .attr('stroke-width', 0.85)
          .attr('stroke-linejoin', 'round')
          .attr('pointer-events', 'none');

        svg.append('path')
          .datum(stateFeature)
          .attr('d', path)
          .attr('fill', 'none')
          .attr('stroke', '#26322a')
          .attr('stroke-opacity', 0.45)
          .attr('stroke-width', 1.5)
          .attr('pointer-events', 'none');

        const hoverOutline = svg.append('path')
          .attr('class', 'hover-outline')
          .style('display', 'none');

        svg.append('g')
          .attr('clip-path', `url(#${clipId})`)
          .selectAll('path')
          .data(countyFeatures)
          .join('path')
          .attr('class', 'interactive-hit')
          .attr('tabindex', 0)
          .attr('aria-label', d => `${d.properties?.NAME || 'County'} County`)
          .attr('d', path)
          .on('mouseenter', function(event, d) {

          })
          .on('mouseleave', function() {
            setLabel(stateName);
            hoverOutline.style('display', 'none');
          })
          .on('focus', function(event, d) {
            const name = d.properties?.NAME || 'County';
            setLabel(`${name} County`, stateName);
            hoverOutline.datum(d).attr('d', path).style('display', null);
          })
          .on('blur', function() {
            setLabel(stateName);
            hoverOutline.style('display', 'none');
          })
          .on('click', function(event, d) {
            const name = d.properties?.NAME || 'County';
            setLabel(`${name} County`, stateName);
            hoverOutline.datum(d).attr('d', path).style('display', null);
          });
      } catch (error) {
        console.error('County map failed to load', error);
        clearMap();
        const stateFeature = stateFeatures.find(f => normalizeStateId(f.id) === stateId);
        const projection = d3.geoAlbers();
        projection.fitExtent([[38, 30], [width - 38, height - 30]], stateFeature);
        const path = d3.geoPath(projection);
        svg.append('path').datum(stateFeature).attr('d', path).attr('fill', '#efefee').attr('stroke', '#26322a').attr('stroke-opacity', 0.45).attr('stroke-width', 1.5);
        drawRangeLayers(path);
        svg.append('text')
          .attr('class', 'loading')
          .attr('x', width / 2)
          .attr('y', height - 20)
          .text('County boundaries could not load.');
      }
    }

    async function init() {
      buildLegend();
      const _tw = await Promise.all([d3.json('https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json'), d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')]);
      topoData = _tw[0];
      neighborFeatures = topojson.feature(_tw[1], _tw[1].objects.countries).features.filter(function(f){ return String(f.id)==='124' || String(f.id)==='484'; });
      const allStates = topojson.feature(topoData, topoData.objects.states).features;
      stateFeatures = allStates.filter(f => selectedIds.has(normalizeStateId(f.id)));
      renderUsMap();
    }

    backButton.addEventListener('click', renderUsMap);

    init().catch(error => {
      console.error('Map failed to load', error);
      setLabel('Map could not load');
    });
  </script>
</body>
</html>
