<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pickerel Frog Indiana Range Map</title>
<style>
  :root {
    --card-bg: #ffffff;
    --card-border: #d8ddd7;
    --map-bg: #ffffff;
    --state-fill: #efefee;
    --state-border: #aeb8b0;
    --text: #26322a;
    --muted: #5f6a63;
    --range: #3CA24E;
    --range-stroke: #2A7A38;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    font-family: Arial, Helvetica, sans-serif;
    color: var(--text);
  }

  .range-card {
    width: 100%;
    max-width: 430px;
    margin: 0 auto;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 14px 14px 12px;
  }

  .county-label {
    min-height: 26px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 8px;
    font-size: 17px;
    font-weight: 600;
    color: var(--text);
    text-align: center;
  }

  .county-label.empty {
    color: transparent;
    user-select: none;
  }

  .map-wrap {
    width: 100%;
    background: var(--map-bg);
    border: 1px solid #dfe4df;
    border-radius: 10px;
    overflow: hidden;
  }

  svg {
    display: block;
    width: 100%;
    height: auto;
  }

  .legend {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 12px;
    font-size: 16px;
    font-weight: 500;
    color: var(--text);
  }

  .swatch {
    width: 26px;
    height: 26px;
    border-radius: 5px;
    background: var(--range);
    flex: 0 0 26px;
  }

  .note {
    margin: 12px 0 0;
    font-size: 13px;
    line-height: 1.45;
    color: var(--muted);
  }

  .divider {
    height: 1px;
    background: #e2e6e1;
    margin: 12px 0 10px;
  }

  .meta {
    font-size: 13px;
    line-height: 1.4;
    color: var(--text);
  }

  .meta + .meta { margin-top: 4px; }
  .meta strong { font-weight: 600; }

  @media (max-width: 480px) {
    .range-card {
      padding: 12px;
      border-radius: 10px;
    }
    .county-label { font-size: 15px; min-height: 22px; }
    .legend { font-size: 15px; }
    .note, .meta { font-size: 12px; }
  }
</style>
</head>

      </svg>
    </div>

    <div class="divider"></div>

,39.7808],[-91.3857,39.816],[-91.4314,39.8718],[-91.4181,39.9479],[-91.4636,40.0131],[-91.2594,40.0879],[-90.6457,39.9512],[-90.6488,39.7054],[-90.5553,39.5748],[-90.659,39.46],[-90.5958,39.3946],[-90.0715,39.3689],[-90.0047,39.1022],[-89.8844,38.914],[-90.0195,38.4979],[-90.0095,38.4162],[-89.8152,38.2344],[-89.7659,38.1222],[-89.6489,38.043],[-89.5651,37.9249],[-89.2089,37.7875],[-89.2398,37.7298],[-89.1798,37.5927],[-88.9616,37.4457],[-89.0551,37.367],[-89.3358,37.28],[-89.4413,37.3409],[-89.407,37.4043],[-89.5194,37.589],[-89.961,37.6442],[-90.1836,37.8729],[-90.3986,37.8972],[-90.625,37.7906],[-90.7034,37.689],[-90.3837,37.4814],[-90.3091,37.3502],[-90.3574,37.1036],[-90.6788,36.8896],[-90.7896,36.6543],[-90.7823,36.5719],[-90.601,36.4899],[-90.6797,36.4283],[-90.8265,36.4158],[-91.0702,36.2285],[-91.1669,36.071],[-91.1342,35.8635],[-91.2794,35.7185],[-91.3504,35.5081],[-91.534,35.3333],[-91.6749,35.2452],[-91.9362,35.2477],[-92.5102,35.5082],[-92.5017,35.5502],[-92.3415,35.665],[-92.4177,35.9758],[-92.4816,36.0815],[-92.8829,36.1039],[-93.0156,36.1953],[-93.1603,36.4477],[-93.3252,36.4965],[-93.622,36.5267],[-93.744,36.5085],[-93.8326,36.4406],[-93.8466,36.3886],[-93.4628,36.159],[-93.2898,36.1304],[-93.2571,35.9848],[-93.2808,35.9075],[-93.5694,35.9286],[-93.9526,35.6663],[-94.2446,35.5512],[-94.4455,35.5642],[-94.6142,35.4947],[-94.9588,35.5299],[-95.1586,35.7437],[-95.1368,35.8983],[-95.1719,36.1128],[-95.1057,36.1948],[-95.0479,36.3464],[-94.7136,36.5924],[-94.6675,36.7319],[-94.5038,36.7357],[-94.3477,36.6707],[-94.2511,36.7247],[-94.1744,36.9072],[-94.3917,37.0552],[-94.4262,37.1766],[-94.2517,37.3054],[-94.1884,37.5801],[-93.8335,37.7249]]],[[[-89.3983,36.3863],[-89.3313,36.4157],[-89.3023,36.3961],[-89.3579,36.244],[-89.4724,36.2853],[-89.3983,36.3863]]],[[[-88.5295,36.1778],[-88.4377,36.3001],[-88.311,36.2509],[-88.3433,36.1886],[-88.4693,36.1136],[-88.5196,36.1156],[-88.5295,36.1778]]],[[[-81.8941,33.1014],[-81.9786,33.1508],[-81.9842,33.2507],[-81.8307,33.2262],[-81.8337,33.0979],[-81.8941,33.1014]]],[[[-86.7334,31.2924],[-86.8803,31.281],[-86.932,31.3417],[-86.8524,31.4168],[-86.722,31.4256],[-86.6929,31.4043],[-86.6913,31.3341],[-86.7334,31.2924]]],[[[-87.3671,31.7552],[-87.3036,31.7605],[-87.2521,31.6876],[-87.3778,31.5752],[-87.4409,31.608],[-87.468,31.6659],[-87.3671,31.7552]]]]};

    function setCountyLabel(name) {
      if (name) {
        countyLabel.textContent = name + ' County';
        countyLabel.classList.remove('empty');
      } else {
        countyLabel.textContent = 'County name';
        countyLabel.classList.add('empty');
      }
    }

    async function init() {
      const [stateTopo, countyTopo] = await Promise.all([
        d3.json('https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json'),
        d3.json('https://cdn.jsdelivr.net/npm/us-atlas@3/counties-10m.json')
      ]);

      const states = topojson.feature(stateTopo, stateTopo.objects.states).features;
      const indiana = states.find(f => String(f.id).padStart(2, '0') === '18');
      if (!indiana) throw new Error('Indiana state geometry was not found.');

      const allCounties = topojson.feature(countyTopo, countyTopo.objects.counties).features;
      const indianaCounties = allCounties.filter(f => String(f.id).padStart(5, '0').startsWith('18'));

      const projection = d3.geoConicConformal()
        .parallels([37.5, 41.8])
        .rotate([86.2, 0])
        .center([0, 39.6]);

      projection.fitExtent([[34, 26], [width - 34, height - 26]], indiana);
      const path = d3.geoPath(projection);

      const defs = svg.append('defs');
      defs.append('clipPath')
        .attr('id', 'indianaClip')
        .append('path')
        .datum(indiana)
        .attr('d', path);

      // Base state shape.
      svg.append('path')
        .datum(indiana)
        .attr('d', path)
        .attr('fill', '#efefee')
        .attr('stroke', 'none');

      // CNAH range polygon clipped to Indiana.
      svg.append('path')
        .datum(rangeGeo)
        .attr('d', path)
        .attr('clip-path', 'url(#indianaClip)')
        .attr('fill', '#3CA24E')
        .attr('fill-opacity', 0.82)
        .attr('stroke', '#2A7A38')
        .attr('stroke-width', 0.8)
        .attr('stroke-opacity', 0.4)
        .attr('pointer-events', 'none');

      // County boundaries on top for geographic reference.
      svg.append('g')
        .attr('clip-path', 'url(#indianaClip)')
        .selectAll('path')
        .data(indianaCounties)
        .join('path')
        .attr('d', path)
        .attr('fill', 'none')
        .attr('stroke', '#ffffff')
        .attr('stroke-width', 0.9)
        .attr('stroke-opacity', 0.9)
        .attr('pointer-events', 'none');

      // Crisp Indiana outline.
      svg.append('path')
        .datum(indiana)
        .attr('d', path)
        .attr('fill', 'none')
        .attr('stroke', '#aeb8b0')
        .attr('stroke-width', 1.7)
        .attr('stroke-linejoin', 'round')
        .attr('pointer-events', 'none');

      // Hover/tap outline and county-name interaction.
      const hoverOutline = svg.append('path')
        .attr('fill', 'none')
        .attr('stroke', '#26322a')
        .attr('stroke-width', 1.6)
        .attr('stroke-opacity', 0.55)
        .attr('pointer-events', 'none')
        .style('display', 'none');

      svg.append('g')
        .selectAll('path')
        .data(indianaCounties)
        .join('path')
        .attr('d', path)
        .attr('fill', 'transparent')
        .attr('tabindex', 0)
        .attr('role', 'button')
        .attr('aria-label', d => (d.properties?.name || 'Indiana county') + ' County')
        .style('cursor', 'pointer')
        .on('mouseenter', function(event, d) {
          setCountyLabel(d.properties?.name || '');
          hoverOutline.datum(d).attr('d', path).style('display', null);
        })
        .on('mouseleave', function() {
          setCountyLabel('');
          hoverOutline.style('display', 'none');
        })
        .on('focus', function(event, d) {
          setCountyLabel(d.properties?.name || '');
          hoverOutline.datum(d).attr('d', path).style('display', null);
        })
        .on('blur', function() {
          setCountyLabel('');
          hoverOutline.style('display', 'none');
        })
        .on('click', function(event, d) {
          setCountyLabel(d.properties?.name || '');
          hoverOutline.datum(d).attr('d', path).style('display', null);
        });
    }

    init().catch(err => {
      console.error('Map failed to load', err);
      countyLabel.textContent = 'Map could not load';
      countyLabel.classList.remove('empty');
      svg.append('text')
        .attr('x', width / 2)
        .attr('y', height / 2)
        .attr('text-anchor', 'middle')
        .attr('fill', '#5f6a63')
        .attr('font-size', 15)
        .text('Map could not load.');
    });
  </script>
